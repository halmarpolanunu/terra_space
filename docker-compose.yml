volumes:
  db-data:

services:
  backend:
    build:
      context: ./backend
    environment:
      TERRA_DATA_DIR: /data
      TERRA_LM_STUDIO_URL: ${TERRA_LM_STUDIO_URL:-http://host.docker.internal:1234}
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - ./data:/data
      - db-data:/data/database
    healthcheck:
      test: ["CMD", "python", "-c", "from urllib.request import urlopen; urlopen('http://127.0.0.1:8000/api/health', timeout=5)"]
      interval: 10s
      timeout: 6s
      start_period: 30s
      retries: 8

  frontend:
    build:
      context: ./frontend
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - 127.0.0.1:3000:3000
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((response) => { if (!response.ok) process.exit(1) }).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 3s
      start_period: 15s
      retries: 6
